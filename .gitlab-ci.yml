stages:
  - test
  - build
  - pages
  - release-crate
  - mirror
  - github-release
  - release
  - docker

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_BACKTRACE: "1"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/rendir
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA
  DOCKERHUB_USERNAME: "hahihula"

include:
  - local: '.gitlab/templates/docker-build.yml'

.cache_template: &cache_config
  cache:
    key: ${CI_COMMIT_REF_SLUG}-${CI_JOB_NAME}
    paths:
      - .cargo/
      - target/

#############################################
# Test Stage
#############################################

test:linux:cli:
  stage: test
  image: rustlang/rust:nightly
  <<: *cache_config
  script:
    - rustc --version && cargo --version
    - cargo test
  only:
    - master
    - tags
    - merge_requests
  interruptible: true

#############################################
# Build Stage
#############################################

build:linux:cli:
  stage: build
  image: rustlang/rust:nightly
  <<: *cache_config
  script:
    - rustc --version && cargo --version
    - cargo build --release --package rendir
    - mkdir -p artifacts/linux
    - cp target/release/rendir artifacts/linux/rendir-linux-x86_64
  artifacts:
    paths:
      - artifacts/linux/
    expire_in: 1 week
  only:
    - master
    - tags
    - merge_requests
  interruptible: true

#############################################
# Release Jobs (On Tags — automatic)
#############################################

# Step 1: publish rendir-core first
release:crates-io:core:
  stage: release-crate
  image: rustlang/rust:nightly
  <<: *cache_config
  script:
    - cargo login $CRATES_IO_TOKEN
    # Strip the path dependency so crates.io accepts the publish
    - cd rendir-core
    - cargo publish --allow-dirty
  only:
    - tags
  # allow_failure so re-pushing the same tag (e.g. to fix a Docker-only
  # problem) does not break the rest of the pipeline. The publish either
  # succeeds or surfaces a clear error in the job log.
  allow_failure: true

# Step 2: publish rendir CLI — depends on core being on the registry
release:crates-io:cli:
  stage: release-crate
  image: rustlang/rust:nightly
  <<: *cache_config
  needs:
    - release:crates-io:core
  script:
    - cargo login $CRATES_IO_TOKEN
    - cd rendir
    # crates.io index propagation delay — core needs to be visible
    - echo "Waiting 60s for crates.io index to propagate..."
    - sleep 60
    - cargo publish --allow-dirty
  only:
    - tags
  allow_failure: true

# Step 3: build and publish WASM to npm
# TEMPORARILY DISABLED for v0.1.0 — the npmjs.com account has 2FA enabled
# and the CI token cannot supply an OTP. Job name starts with a leading dot
# (`.release:npm:wasm`) which makes it a "hidden job" in GitLab CI: the
# definition is kept in this file for future reference but it is never
# scheduled. To re-enable: rename to `release:npm:wasm` (drop the leading
# dot) — no other change is needed, `when` defaults to `on_success`.
.release:npm:wasm:
  stage: release-crate
  image: rustlang/rust:nightly
  needs:
    - release:crates-io:core
  before_script:
    - apt-get update -qq && apt-get install -y -qq nodejs npm
    - curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    # Install a recent npm (apt ships an old one)
    - npm install -g npm@latest
  script:
    - rustc --version && cargo --version && wasm-pack --version
    - cd rendir-wasm
    # Build for bundler target (most useful for npm consumers)
    # Also build web target so the GitLab pages demo still works
    - wasm-pack build --target bundler --out-dir pkg-npm
    - wasm-pack build --target web --out-dir pkg-web
    # Set the package name and version from the Cargo.toml
    - WASM_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
    - |
      node -e "
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('pkg-npm/package.json'));
        pkg.name = 'rendir-wasm';
        pkg.version = '$WASM_VERSION';
        pkg.description = 'WebAssembly bindings for rendir-core — convert Markdown to Vue 3 SPAs in the browser';
        pkg.keywords = ['rendir', 'wasm', 'markdown', 'vue', 'static-site'];
        pkg.license = 'MIT';
        pkg.repository = { type: 'git', url: 'https://gitlab.com/hahihula/rendir' };
        fs.writeFileSync('pkg-npm/package.json', JSON.stringify(pkg, null, 2));
      "
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - cd pkg-npm
    - npm publish --access public
  artifacts:
    # Keep the web build for the pages job
    paths:
      - rendir-wasm/pkg-web/
    expire_in: 1 week
  only:
    - tags

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build:linux:cli
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Linux CLI (x86_64)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/artifacts/linux/rendir-linux-x86_64"
  only:
    - tags

#############################################
# GitHub Mirror Job
#############################################

mirror:github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git bash
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"

    - |
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "ERROR: GITHUB_TOKEN is not set!"
        exit 1
      fi

    - git remote add github "https://${GITHUB_TOKEN}@github.com/hahihula/rendir.git" || \
      git remote set-url github "https://${GITHUB_TOKEN}@github.com/hahihula/rendir.git"

    - git fetch --all

    - |
      if [ "$CI_COMMIT_TAG" != "" ]; then
        echo "Processing tag: $CI_COMMIT_TAG"
        git push "https://${GITHUB_TOKEN}@github.com/hahihula/rendir.git" "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG" --force
      else
        echo "Processing branch: $CI_COMMIT_REF_NAME"
        git checkout -B $CI_COMMIT_REF_NAME

        if [ -f README.MD ]; then
          cp README.MD README.md.original
        fi

        echo "# Mirror Notice" > README.md
        echo "" >> README.md
        echo "This repository is a mirror of the primary repository hosted on GitLab: [${CI_PROJECT_URL}](${CI_PROJECT_URL})." >> README.md
        echo "All development and contributions happen on the GitLab repository. Please submit issues and pull requests there." >> README.md
        echo "" >> README.md
        echo "## Original README" >> README.md
        echo "" >> README.md

        if [ -f README.md.original ]; then
          cat README.md.original >> README.md
        fi

        # Remove the original README.MD and the temp file so only the mirror
        # notice (README.md) is displayed on GitHub.
        rm -f README.md.original
        git rm --ignore-unmatch README.MD
        git add README.md
        git commit -m "Update README for GitHub mirror [skip ci]" || true
        git push "https://${GITHUB_TOKEN}@github.com/hahihula/rendir.git" "$CI_COMMIT_REF_NAME" --force
      fi
  only:
    - master
    - tags

github:release:create:
  stage: github-release
  image: alpine:latest
  before_script:
    - apk add --no-cache github-cli
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"
  script:
    - |
      if [ "$CI_COMMIT_TAG" != "" ]; then
        echo "Creating GitHub release for tag: $CI_COMMIT_TAG"
        export GH_TOKEN=$GITHUB_TOKEN

        if gh release view "$CI_COMMIT_TAG" --repo "hahihula/rendir" 2>/dev/null; then
          echo "Release $CI_COMMIT_TAG already exists, deleting it first..."
          gh release delete "$CI_COMMIT_TAG" --repo "hahihula/rendir" --yes
        fi

        gh release create "$CI_COMMIT_TAG" \
          --title "Release $CI_COMMIT_TAG" \
          --notes "Release $CI_COMMIT_TAG - Automated release" \
          --repo "hahihula/rendir"

        echo "GitHub release created successfully!"
      else
        echo "Not a tag, skipping GitHub release creation."
      fi
  only:
    - tags

#############################################
# Docker Build & Push (On Tags)
#############################################

docker:build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rendir
  script:
    - docker build -t $DOCKER_IMAGE:latest .
    - docker tag $DOCKER_IMAGE:latest $DOCKER_IMAGE:$CI_COMMIT_TAG
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker push $DOCKER_IMAGE:$CI_COMMIT_TAG
    - docker push $DOCKER_IMAGE:latest
  only:
    - tags
  when: manual
  allow_failure: false

docker:build:alpine:
  stage: docker
  extends: .docker:build:alpine
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rendir-alpine
  only:
    - tags
  when: manual

# Docker build using the reusable template
docker:build:using-template:
  stage: docker
  extends: .docker:build:alpine
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rendir
  only:
    - tags
  when: manual

#############################################
# GitLab Pages (WASM Demo)
#############################################

pages:
  stage: pages
  image: rustlang/rust:nightly
  before_script:
    - curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
  script:
    - rustc --version && cargo --version && wasm-pack --version
    - cd rendir-wasm
    - rm -rf dist
    - wasm-pack build --target web
    - mkdir ./dist
    - cp ./demo/index.html ./dist/
    - cp -r ./pkg/. ./dist/
    - mv ./dist ../public
  artifacts:
    paths:
      - public
  only:
    - master
  interruptible: true
