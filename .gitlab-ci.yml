stages:
  - test
  - build
  - pages
  - release-crate
  - mirror
  - github-release
  - release
  - docker

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_BACKTRACE: "1"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/rustpress
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA
  DOCKERHUB_USERNAME: "hahihula"

include:
  - local: '.gitlab/templates/docker-build.yml'

.cache_template: &cache_config
  cache:
    key: ${CI_COMMIT_REF_SLUG}-${CI_JOB_NAME}
    paths:
      - .cargo/
      - target/

#############################################
# Test Stage
#############################################

test:linux:cli:
  stage: test
  image: rust:nightly
  <<: *cache_config
  script:
    - rustc --version && cargo --version
    - cargo test
  only:
    - master
    - tags
    - merge_requests
  interruptible: true

#############################################
# Build Stage
#############################################

build:linux:cli:
  stage: build
  image: rust:nightly
  <<: *cache_config
  script:
    - rustc --version && cargo --version
    - cargo build --release --package rustpress
    - mkdir -p artifacts/linux
    - cp target/release/rustpress artifacts/linux/rustpress-linux-x86_64
  artifacts:
    paths:
      - artifacts/linux/
    expire_in: 1 week
  only:
    - master
    - tags
    - merge_requests
  interruptible: true

#############################################
# Release Jobs (On Tags)
#############################################

release:crates-io:
  stage: release-crate
  image: rust:latest
  script:
    - cargo login $CRATES_IO_TOKEN
    - cd rustpress
    - cargo publish
  only:
    - tags
  when: manual
  allow_failure: true

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build:linux:cli
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Linux CLI (x86_64)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/artifacts/linux/rustpress-linux-x86_64"
  only:
    - tags

#############################################
# GitHub Mirror Job
#############################################

mirror:github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git bash
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"

    - |
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "ERROR: GITHUB_TOKEN is not set!"
        exit 1
      fi

    - git remote add github "https://${GITHUB_TOKEN}@github.com/hahihula/rustpress.git" || \
      git remote set-url github "https://${GITHUB_TOKEN}@github.com/hahihula/rustpress.git"

    - git fetch --all

    - |
      if [ "$CI_COMMIT_TAG" != "" ]; then
        echo "Processing tag: $CI_COMMIT_TAG"
        git push "https://${GITHUB_TOKEN}@github.com/hahihula/rustpress.git" "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG" --force
      else
        echo "Processing branch: $CI_COMMIT_REF_NAME"
        git checkout -B $CI_COMMIT_REF_NAME

        if [ -f README.MD ]; then
          cp README.MD README.md.original
        fi

        echo "# Mirror Notice" > README.md
        echo "" >> README.md
        echo "This repository is a mirror of the primary repository hosted on GitLab: [${CI_PROJECT_URL}](${CI_PROJECT_URL})." >> README.md
        echo "All development and contributions happen on the GitLab repository. Please submit issues and pull requests there." >> README.md
        echo "" >> README.md
        echo "## Original README" >> README.md
        echo "" >> README.md

        if [ -f README.md.original ]; then
          cat README.md.original >> README.md
        fi

        git add README.md
        git commit -m "Update README for GitHub mirror [skip ci]" || true
        git push "https://${GITHUB_TOKEN}@github.com/hahihula/rustpress.git" "$CI_COMMIT_REF_NAME" --force
      fi
  only:
    - master
    - tags

github:release:create:
  stage: github-release
  image: alpine:latest
  before_script:
    - apk add --no-cache github-cli
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"
  script:
    - |
      if [ "$CI_COMMIT_TAG" != "" ]; then
        echo "Creating GitHub release for tag: $CI_COMMIT_TAG"
        export GH_TOKEN=$GITHUB_TOKEN

        if gh release view "$CI_COMMIT_TAG" --repo "hahihula/rustpress" 2>/dev/null; then
          echo "Release $CI_COMMIT_TAG already exists, deleting it first..."
          gh release delete "$CI_COMMIT_TAG" --repo "hahihula/rustpress" --yes
        fi

        gh release create "$CI_COMMIT_TAG" \
          --title "Release $CI_COMMIT_TAG" \
          --notes "Release $CI_COMMIT_TAG - Automated release" \
          --repo "hahihula/rustpress"

        echo "GitHub release created successfully!"
      else
        echo "Not a tag, skipping GitHub release creation."
      fi
  only:
    - tags

#############################################
# Docker Build & Push (On Tags)
#############################################

docker:build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rustpress
  script:
    - docker build -t $DOCKER_IMAGE:latest .
    - docker tag $DOCKER_IMAGE:latest $DOCKER_IMAGE:$CI_COMMIT_TAG
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker push $DOCKER_IMAGE:$CI_COMMIT_TAG
    - docker push $DOCKER_IMAGE:latest
  only:
    - tags
  when: manual
  allow_failure: false

docker:build:alpine:
  stage: docker
  extends: .docker:build:alpine
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rustpress-alpine
  only:
    - tags
  when: manual

# Docker build using the reusable template
docker:build:using-template:
  stage: docker
  extends: .docker:build:alpine
  variables:
    DOCKER_IMAGE: $DOCKERHUB_USERNAME/rustpress
  only:
    - tags
  when: manual

#############################################
# GitLab Pages (WASM Demo)
#############################################

pages:
  stage: pages
  image: rust:nightly
  before_script:
    - curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
  script:
    - rustc --version && cargo --version && wasm-pack --version
    - cd rustpress-wasm
    - rm -rf dist
    - wasm-pack build --target web
    - cp ./demo/index.html ./dist/
    - cp -r ./pkg/. ./dist/
    - mv ./dist ../public
  artifacts:
    paths:
      - public
  only:
    - master
  interruptible: true