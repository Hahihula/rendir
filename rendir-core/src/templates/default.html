<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="generator" content="rendir">
    <title>{{ title }}</title>
    <style>
        /* Basic styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Component styles */
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .alert-info {
            background-color: #e3f2fd;
            border-left: 5px solid #2196F3;
        }

        .alert-warning {
            background-color: #fff9c4;
            border-left: 5px solid #ffc107;
        }

        .alert-error {
            background-color: #ffebee;
            border-left: 5px solid #f44336;
        }

        /* Tab styles */
        .tabs-container {
            margin: 20px 0;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            font-weight: normal;
        }

        .tab-btn.active {
            color: #2196F3;
            font-weight: bold;
            border-bottom: 2px solid #2196F3;
        }

        .tab-contents {
            border: 1px solid #ddd;
            border-top: none;
            padding: 15px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Video container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Powered by footer */
        .powered-by {
            max-width: 800px;
            margin: 2rem auto 1rem;
            padding: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #eee;
        }
        .powered-by a {
            color: #2196F3;
            text-decoration: none;
        }
        .powered-by a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>
        {{ content }}
    </main>
    <footer class="powered-by">
        Powered by <a href="https://gitlab.com/hahihula/rendir" target="_blank" rel="noopener">rendir</a>
    </footer>
</body>

</html>
