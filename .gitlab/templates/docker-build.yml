# Reusable Docker build template for GitLab CI
# Usage:
#   include:
#     - local: '.gitlab/templates/docker-build.yml'
#
#   docker:build:
#     extends: .docker:build:alpine
#     variables:
#       DOCKER_IMAGE: "your-registry/your-image"
#       DOCKER_TAG: "latest"

.docker:build:alpine:
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker info
  script:
    - 'echo "Building Docker image: ${DOCKER_IMAGE}:${DOCKER_TAG}"'
    - docker build -t ${DOCKER_IMAGE}:${DOCKER_TAG} .
    - echo "Logging in to registry..."
    - if [ -n "$CI_REGISTRY_PASSWORD" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY;
      fi
    - echo "Pushing image to registry..."
    - docker push ${DOCKER_IMAGE}:${DOCKER_TAG}
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

.docker:build:alpine:release:
  extends: .docker:build:alpine
  script:
    - 'echo "Building and pushing release: ${DOCKER_IMAGE}:${CI_COMMIT_TAG}"'
    - docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_TAG} .
    - docker build -t ${DOCKER_IMAGE}:latest .
    - if [ -n "$CI_REGISTRY_PASSWORD" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY;
      fi
    - docker push ${DOCKER_IMAGE}:${CI_COMMIT_TAG}
    - docker push ${DOCKER_IMAGE}:latest